<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>exemplo butao JS</title>
</head>
<body>

        function mensagem() {

            window.alert('Estou deBoas');
        }
    </script>
</body>
