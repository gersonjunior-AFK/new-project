<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Const</title>
</head>

<body>
    <h1>Exemplo Const</h1>
    <p>O nome do sistema e fixo (Const)</p>

    <label for="">Digite seu nome:</label>
    <input type="text" id="nome" placeholder="Digite seu nome aqui">
    <button onclick="mostra()">Mostra</button>
    <p id="resultado"></p>
    <script>
        const sistema = "Sistema Escolar";
        function mostra() {
            let nome = document.getElementById("nome").value;

            document.getElementById("resultado").innerHTML = "Bem-Vindo " + nome + " ao " + sistema;
        }
    </script>
</body>

</html>
