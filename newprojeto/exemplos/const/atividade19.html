<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade19</title>
</head>
<body>
    <h1>atividade 19</h1>

     <label for="">Digite seu nome:</label>
    <input type="text" id="nome" placeholder="Digite seu nome aqui">

    
     <label for="">Digite sua idade:</label>
    <input type="number" id="idade" placeholder="Digite sua idade aqui">

    <button onclick="mostra()">Mostra</button>

    <p id="resultado"></p>
    <script>
        const sistema = "Parabéns para você!!!";

         function mostra() {
            let nome = document.getElementById("nome").value;
            let idade = document.getElementById("idade").value;
            document.getElementById("resultado").innerHTML = "Bem-Vindo " + nome + " Você tem "+idade+" anos."+ sistema;
}    
</script>
    
</body>
</html>
